name: Build PiyuAI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller openai rich prompt_toolkit

      - name: Build exe
        run: |
          pyinstaller --onefile --console --name PiyuAI_setup piyuai.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/PiyuAI_setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller openai rich prompt_toolkit

      - name: Build app bundle
        run: |
          pyinstaller --onefile --console --name PiyuAI piyuai.py

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp dist/PiyuAI dmg_contents/
          hdiutil create \
            -volname "PiyuAI" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            PiyuAI.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: PiyuAI.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PiyuAI_setup.exe
            PiyuAI.dmg
          generate_release_notes: true
